<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="script.js" defer></script>
</head>

<body>

<div class="container mt-5">
  <div class="col-md-5 mx-auto">
    <div class="card p-4 shadow">
      <h3 class="text-center">Register</h3>

      <form onsubmit="return validateRegister()">
        <input id="name" class="form-control mb-3" placeholder="Full Name">
        <input id="email" class="form-control mb-3" placeholder="Email">
        <input id="password" type="password" class="form-control mb-3" placeholder="Password">
        <input id="confirm" type="password" class="form-control mb-3" placeholder="Confirm Password">

        <button class="btn btn-warning w-100">Register</button>
      </form>

    </div>
  </div>
</div>

</body>
</html>
